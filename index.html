<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Audit Energetico - Relazione</title>

  <!-- PWA / Icone -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7E57C2">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" type="image/png" sizes="192x192" href="icona-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icona-512.png">
  <link rel="apple-touch-icon" href="icona-192.png">

  <!-- ATECO map -->
  <script src="ateco_map.js"></script>

  <!-- Chart.js + datalabels -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root { --b:#ddd; --bg:#fafafa; --txt:#111; --muted:#666; }
    html, body { height: 100%; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--txt);
      background:var(--bg);
      overflow: hidden;
    }

    header{
      padding:16px 20px;
      border-bottom:1px solid var(--b);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    header .sub{ color:var(--muted); font-size:12px; margin-top:4px; }
    .hdrLeft{ display:flex; flex-direction:column; }
    .hdrRight{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }

    .wrap{
      display:grid;
      grid-template-columns: 460px 1fr;
      gap:16px;
      padding:16px;
      height: calc(100vh - 70px);
      box-sizing:border-box;
    }

    .panel{
      background:#fff;
      border:1px solid var(--b);
      border-radius:14px;
      padding:14px;
      box-sizing:border-box;
    }
    .panel h2{ margin:0 0 10px; font-size:15px; }

    label{ display:block; font-size:12px; margin:10px 0 6px; color:#333; }
    input, select, textarea{
      width:100%;
      box-sizing:border-box;
      padding:10px;
      border:1px solid #ccc;
      border-radius:10px;
      background:#fff;
      font-size:14px;
    }
    textarea{ resize: vertical; min-height: 90px; }

    .row{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .btns{ display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
    button{
      padding:10px 12px;
      border-radius:10px;
      cursor:pointer;
      border:1px solid #ccc;
      background:#fff;
      font-size:14px;
      line-height:1;
    }
    button.primary{ background:#111; color:#fff; border-color:#111; }
    button.small{ padding:8px 10px; font-size:13px; }

    .note{ color:var(--muted); font-size:12px; margin-top:10px; line-height:1.35; }
    .hr{ border:0; border-top:1px solid #eee; margin:14px 0; }

    .doc{
      max-width: 1050px;
      margin: 0 auto;
      padding: 10px 18px 40px;
      background:#fff;
      border:1px solid #eee;
      border-radius:14px;
    }
    .doc h1{ font-size:22px; margin:8px 0 12px; text-align:left; }
    .doc h2{ font-size:16px; margin:18px 0 8px; }
    .doc h3{ font-size:14px; margin:16px 0 8px; }
    .doc p{ font-size:13px; line-height:1.45; margin:0 0 10px; text-align:justify; }
    .muted{ color:var(--muted); font-size:12px; }

    table{ width:100%; border-collapse: collapse; font-size:13px; margin:8px 0 12px; }
    th, td{ border:1px solid #ddd; padding:8px; vertical-align:top; }
    th{ background:#f6f6f6; text-align:left; }
    .center{ text-align:center; }
    .right{ text-align:right; }

    .intervForm{ border:1px solid #eee; border-radius:12px; padding:10px; }

    .iRow{
      display:grid;
      grid-template-columns: 4.6fr 1.2fr 1.1fr 0.7fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    .iRow:first-child{ margin-top:0; }

    .inlineChk{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px;
      border:1px solid #ccc;
      border-radius:10px;
      background:#fff;
      height: 42px;
      box-sizing:border-box;
    }
    .inlineChk input{ width:auto; }

    .chartCard{ border:1px solid #eee; border-radius:14px; padding:12px; background:#fff; margin:8px 0 12px; }
    .chartTitle{ font-size:16px; font-weight:600; text-align:center; margin:6px 0 8px; }
    .chartWrap{ position:relative; width:100%; }

    .chartWrap.donut{
      max-width:320px;
      aspect-ratio:1 / 1;
      margin:0 auto;
    }
    .chartWrap.donut.donut75{
      max-width:520px;
      width:100%;
      aspect-ratio:2 / 1;
      margin:0 auto;
    }
    .chartWrap.donut.donut75 canvas,
    .chartWrap.donut canvas{
      width:100% !important;
      height:100% !important;
      display:block;
    }

    .charts2{ display:grid; grid-template-columns:2fr 1fr; gap:14px; align-items:start; }
    .charts2equal{ display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:start; }

    @media (max-width: 980px){
      .wrap{ grid-template-columns: 1fr; }
      .charts2{ grid-template-columns: 1fr; }
      .charts2equal{ grid-template-columns: 1fr; }
      .iRow{ grid-template-columns: 1fr; }
    }

    .indice{
      margin: 40px 0;
      padding: 18px 24px;
      border: 1px solid #eee;
      border-radius: 14px;
      background: #fafafa;
    }
    .indice h2{ margin:0 0 12px; font-size:16px; }
    .indice ul{ margin:0; padding-left:18px; }
    .indice li{ margin:6px 0; font-size:13px; }

    .panel.form{
      display:flex;
      flex-direction:column;
      height:100%;
      overflow-y:auto;
      padding-right:8px;
    }
    .panel.preview{ overflow-y:auto; }
    .formContent{
      flex:1;
      overflow-y:auto;
      padding-right:8px;
    }

    .panel.form h2:last-of-type,
    .panel.form .btns{ flex-shrink:0; }

    .stato-verde{ color:#1f7a3a; font-weight:700; }
    .stato-giallo{ color:#a36b00; font-weight:700; }
    .stato-rosso{ color:#8b0000; font-weight:700; }

    body.fullForm .wrap{ grid-template-columns:1fr !important; }
    body.fullForm .panel.preview{ display:none !important; }

    .modalBackdrop{
      position:fixed; inset:0;
      background: rgba(0,0,0,0.35);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }
    .modalBackdrop.open{ display:flex; }
    .modal{
      width:min(720px, 95vw);
      background:#fff;
      border:1px solid #e6e6e6;
      border-radius:14px;
      padding:14px;
      box-shadow:0 10px 30px rgba(0,0,0,0.18);
    }
    .modalHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .modalTitle{ font-weight:700; }
    .projList{
      max-height:50vh;
      overflow:auto;
      border:1px solid #eee;
      border-radius:12px;
    }
    .projItem{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-bottom:1px solid #f0f0f0;
    }
    .projItem:last-child{ border-bottom:0; }
    .projMeta{ font-size:12px; color:var(--muted); margin-top:2px; }
    .projName{ font-weight:600; }

    .chartLegend{
      display:flex;
      gap:14px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .chartLegend .lgItem{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      color:#333;
      white-space:nowrap;
      border-left:14px solid #000;
      padding-left:8px;
    }

    .callout{
      border:1px solid #e8e8e8;
      border-left:6px solid #7E57C2;
      background:#fafafa;
      border-radius:14px;
      padding:14px 16px;
      margin:12px 0 14px;
      box-shadow:0 6px 16px rgba(0,0,0,0.04);
    }
    .calloutTitle{
      font-weight:800;
      font-size:13px;
      letter-spacing:.2px;
      text-transform:uppercase;
      color:#4b2ea5;
      margin:0 0 8px;
    }
    .callout p{ margin:0; }

    .nextStepsHeader{ margin-bottom:10px; }
    .nextStepsHeader .kicker{
      font-weight:800;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.25px;
      color:#4b2ea5;
      margin:0 0 6px;
    }
    .nextStepsHeader h2{ margin:0 0 8px; }
    .nextStepsLead{
      font-size:13px;
      line-height:1.5;
      margin:0;
    }

    .stepsGrid{
      display:grid;
      gap:16px;
      margin-top:14px;
      align-items:start;
    }

    .stepsList{
      display:grid;
      gap:12px;
    }

    .stepCard{
      border:1px solid #eee;
      border-radius:14px;
      padding:12px 14px;
      background:#fff;
      box-shadow:0 6px 18px rgba(0,0,0,0.04);
      position:relative;
      overflow:hidden;
    }
    .stepCard::before{
      content:"";
      position:absolute;
      inset:0;
      border-left:6px solid #7E57C2;
      pointer-events:none;
      opacity:.12;
    }
    .stepTop{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:6px;
    }
    .stepNum{
      width:26px;
      height:26px;
      border-radius:9px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:13px;
      background:#f1edff;
      color:#4b2ea5;
      border:1px solid #e3dbff;
      flex:0 0 auto;
    }
    .stepTitle{
      font-weight:800;
      font-size:13px;
      margin:0;
    }
    .stepCard p{
      margin:0;
      font-size:13px;
      line-height:1.5;
      text-align:left;
    }

    .nextStepsFooter{ margin-top:14px; }

    .charts2 .chartCard:first-child .chartWrap{
      height:240px;
    }
    #chartEffBar{
      width:100% !important;
      height:100% !important;
      display:block;
    }

    @media print {
      @page{
        margin-top:30mm;
        margin-right:10mm;
        margin-bottom:20mm;
        margin-left:15mm;
      }

      header, #formPanel, .panel.form{ display:none !important; }

      body{
        background:#fff !important;
        overflow:visible !important;
      }

      .wrap{
        grid-template-columns:1fr !important;
        padding:0 !important;
        height:auto !important;
      }

      .panel.preview{
        border:0 !important;
        padding:0 !important;
        overflow:visible !important;
      }

      .doc{
        max-width:none !important;
        border:0 !important;
        border-radius:0 !important;
        padding:0 !important;
        margin:0 !important;
      }

      html, body, .wrap, .panel.preview, .doc, #docRoot, .printContent{
        overflow:visible !important;
        transform:none !important;
        filter:none !important;
      }

      .pageBreak{ break-before:page; page-break-before:always; }

      .chartCard, canvas, .callout, .stepCard{
        break-inside:avoid;
        page-break-inside:avoid;
      }

      table{
        break-inside:auto;
        page-break-inside:auto;
      }

      .pageTop{
        break-inside:avoid;
        page-break-inside:avoid;
        height:30mm;
        box-sizing:border-box;
        display:flex;
        align-items:center;
      }
      .pageLogo{ height:15mm; width:auto; }

      h2{ break-after:avoid; page-break-after:avoid; }
      h2 + table{ break-before:avoid; page-break-before:avoid; }

      .charts2equal{
        display:grid !important;
        grid-template-columns:minmax(0,1fr) minmax(0,1fr) !important;
        gap:6mm !important;
        align-items:start !important;
        width:100% !important;
        box-sizing:border-box !important;
      }

      .charts2equal .chartCard{
        width:100% !important;
        min-width:0 !important;
        padding:8px !important;
        box-sizing:border-box !important;
        overflow:hidden !important;
        break-inside:avoid !important;
        page-break-inside:avoid !important;
      }

      .costiConsumiBlock .chartCard{ overflow: visible !important; }
      .costiConsumiBlock .chartWrap{ overflow: visible !important; }

      .charts2equal .chartCard:first-child .chartWrap.donut{
        width:220px !important;
        height:220px !important;
        aspect-ratio:1 / 1 !important;
        margin:0 auto !important;
      }
      .charts2equal .chartCard:first-child .chartWrap.donut canvas{
        width:100% !important;
        height:100% !important;
        display:block !important;
      }

      .charts2equal .chartCard:nth-child(2) .chartWrap{
        height:220px !important;
        min-height:220px !important;
        width:100% !important;
      }
      #chartVettoriEnergetici{
        width:100% !important;
        height:100% !important;
        display:block !important;
      }

      .costiConsumiBlock{
        break-inside:avoid !important;
        page-break-inside:avoid !important;
      }

      .chartWrap.donut.donut75{
        width:520px !important;
        height:260px !important;
        max-width:520px !important;
        aspect-ratio:auto !important;
      }
      .chartWrap.donut.donut75 canvas,
      #chartCostiConsumi{
        width:100% !important;
        height:100% !important;
      }

      .charts2{
        display:grid !important;
        grid-template-columns:minmax(0,1fr) minmax(0,1fr) !important;
        gap:6mm !important;
        align-items:start !important;
        width:100% !important;
        box-sizing:border-box !important;
      }

      .charts2 .chartCard{
        width:100% !important;
        min-width:0 !important;
        padding:8px !important;
        box-sizing:border-box !important;
        overflow:hidden !important;
        break-inside:avoid !important;
        page-break-inside:avoid !important;
      }

      .charts2 .chartCard:first-child .chartWrap{
        height:200px !important;
        min-height:200px !important;
        width:100% !important;
      }
      #chartEffBar{
        width:100% !important;
        height:100% !important;
        display:block !important;
      }

      .charts2 .chartCard:nth-child(2) .chartWrap.donut{
        width:200px !important;
        height:200px !important;
        aspect-ratio:1 / 1 !important;
        margin:0 auto !important;
      }
      .charts2 .chartCard:nth-child(2) .chartWrap.donut canvas{
        width:100% !important;
        height:100% !important;
        display:block !important;
      }

      canvas{ max-width:100% !important; }

      *{
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>

<body>
<header>
  <div class="hdrLeft">
    <div><strong>Luca Carbisiero</strong></div>
    <div class="sub">Benvenuto</div>
  </div>
  <div class="hdrRight">
    <button class="small" id="btnToggleFull" title="Espandi / riduci il pannello sinistro">Schermo intero</button>
  </div>
</header>

<div class="wrap">
  <section class="panel form" id="formPanel">
    <hr class="hr"/>

    <h2>Indicatori specifici - visualizzazione</h2>
    <div class="row">
      <div>
        <label>
          <input type="checkbox" id="show_kpi_ee_spec" checked>
          Mostra KPI Energia elettrica specifico
        </label>
      </div>
      <div>
        <label>
          <input type="checkbox" id="show_kpi_gas_spec" checked>
          Mostra KPI Gas specifico
        </label>
      </div>
    </div>

    <div class="formContent">
      <h2>Dati base</h2>

      <label>Società ({{azienda}})</label>
      <input id="azienda" placeholder="Es. ABC S.r.l." />

      <div class="row">
        <div>
          <label>Data ({{data}})</label>
          <input id="data" type="date" />
        </div>
        <div>
          <label>Indirizzo del sito ({{indirizzo}})</label>
          <input id="indirizzo" placeholder="Via..., Città" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>Codice ATECO ({{ateco}})</label>
          <input id="ateco" placeholder="Es. 80.10.00" />
        </div>
        <div>
          <label>Anno ATECO</label>
          <select id="atecoAnno">
            <option value="2007">2007</option>
            <option value="2025">2025</option>
          </select>
        </div>
      </div>

      <label>Descrizione ATECO ({{descrizioneateco}})</label>
      <input id="descrizioneateco" placeholder="Compilata automaticamente" />

      <hr class="hr"/>

      <h2>Dati generali</h2>
      <div class="row">
        <div>
          <label>Superficie stabilimento [m²] ({{superficie}})</label>
          <input id="superficie" type="number" step="1" />
        </div>
        <div>
          <label>Driver Energetico ({{driver}})</label>
          <input id="driver" type="number" step="0.01" placeholder="Es. pezzi/anno, ton/anno, ore, ecc. (valore numerico)" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>UM Driver Energetico ({{driver_um}})</label>
          <input id="driver_um" placeholder="Es. pezzi, ton, ore, m³..." />
        </div>
        <div>
          <label>Ore lavorative ({{ore_lavorative}})</label>
          <input id="ore_lavorative" type="number" step="1" min="0" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>Ambiente riscaldato ({{ambiente_riscaldato}})</label>
          <select id="ambiente_riscaldato">
            <option value="">—</option>
            <option value="Si">Si</option>
            <option value="No">No</option>
          </select>
        </div>
        <div></div>
      </div>

      <hr class="hr"/>

      <h2>Dati climatici</h2>
      <div class="row">
        <div>
          <label>Regione ({{regione}})</label>
          <select id="regione">
            <option value="">—</option>
            <option value="Abruzzo">Abruzzo</option>
            <option value="Basilicata">Basilicata</option>
            <option value="Calabria">Calabria</option>
            <option value="Campania">Campania</option>
            <option value="Emilia-Romagna">Emilia-Romagna</option>
            <option value="Friuli-Venezia Giulia">Friuli-Venezia Giulia</option>
            <option value="Lazio">Lazio</option>
            <option value="Liguria">Liguria</option>
            <option value="Lombardia">Lombardia</option>
            <option value="Marche">Marche</option>
            <option value="Molise">Molise</option>
            <option value="Piemonte">Piemonte</option>
            <option value="Puglia">Puglia</option>
            <option value="Sardegna">Sardegna</option>
            <option value="Sicilia">Sicilia</option>
            <option value="Toscana">Toscana</option>
            <option value="Trentino-Alto Adige">Trentino-Alto Adige</option>
            <option value="Umbria">Umbria</option>
            <option value="Valle d'Aosta">Valle d'Aosta</option>
            <option value="Veneto">Veneto</option>
          </select>
        </div>
        <div>
          <label>Fascia climatica ({{fascia_climatica}})</label>
          <input id="fascia_climatica" readonly />
        </div>
      </div>

      <div class="row">
        <div>
          <label>Gradi giorno medi regionali ({{gradi_giorno}})</label>
          <input id="gradi_giorno" readonly />
        </div>
        <div></div>
      </div>

      <hr class="hr"/>

      <h2>Flotta aziendale</h2>
      <div class="row">
        <div>
          <label>Numero veicoli flotta aziendale ({{veicoli}})</label>
          <input id="veicoli" type="number" step="1" />
        </div>
        <div>
          <label>Chilometraggio medio auto [km] ({{km}})</label>
          <input id="km" type="number" step="1" />
        </div>
      </div>

      <label>Commento generale ({{Commento_generale}})</label>
      <textarea id="commento_generale" placeholder="Inserisci qui note generali..."></textarea>

      <hr class="hr"/>

      <h2>Consumi ann
